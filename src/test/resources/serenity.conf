serenity {
    project.name = "Ticket System - Screenplay Tests"
    take.screenshots = FOR_EACH_ACTION
    logging = VERBOSE
}

webdriver {
    driver = firefox
    autodownload = true
    timeouts {
        fluentwait = 15000
    }
}

headless.mode = false

environments {
    default {
        webdriver.base.url = "http://localhost:3000"
    }
}
